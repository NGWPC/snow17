# GitLab CI/CD configuration file for snow17 repository

stages:
  - build
  - unit_test
  - sonarqube
  - deploy_test
  - ver_test
  - deploy_oe

build-job:
  image: docker:dind
  stage: build
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - echo "Building Snow17..."
    - docker rm -f snow17-build-container || true
    - docker run --name snow17-build-container -v .:/ngen-app/standalone/snow17 rockylinux:8 bash -c "cd /ngen-app/standalone/snow17/build && make"
    - tar -czf ../snow17.tar.gz .
    - echo "Build complete."

unit-test-job:
  stage: unit_test
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Running unit tests..."
    - docker start snow17-build-container
    - docker exec snow17-build-container bash -c "
        cd /ngen-app/standalone/snow17/test_cases/unit_test && make test"
    - echo "Unit tests complete"

sonarqube-job:
  stage: sonarqube
  variables:
    GIT_STRATEGY: none
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - echo "Running Sonarqube scan..."
    - |
      if [[ "$CI_COMMIT_BRANCH" != "$CI_DEFAULT_BRANCH" ]]; then
        ~/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner -Dsonar.projectKey=snow17-$CI_COMMIT_BRANCH
      else
        ~/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner
      fi

deploy-test-job:
  stage: deploy_test
  variables:
    GIT_STRATEGY: none
  environment: test # NGEN-TEST-COPY
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Deploying Snow17 to TEST..."
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.140.252 "
        sudo rm -rf /ngen-app/archive/standalone/snow17 || true &&
        sudo mv /ngen-app/standalone/snow17 /ngen-app/archive/standalone || true &&
        sudo mkdir -p /ngen-app/standalone/snow17 &&
        sudo chown -R `whoami` /ngen-app/standalone/snow17"
    - scp ../snow17.tar.gz christina.osumi@10.105.140.252:/ngen-app/standalone/snow17
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.140.252 "
        cd /ngen-app/standalone/snow17 &&
        tar -xzf snow17.tar.gz . &&
        rm snow17.tar.gz"
    - echo "Snow17 deployed to TEST"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'

ver-test-job:
  stage: ver_test
  variables:
    GIT_STRATEGY: none
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Running verification tests..."
    # Add automated tests here
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'

deploy-oe-job:
  stage: deploy_oe
  when: manual
  variables:
    GIT_STRATEGY: none
  environment: oe # NGEN-HYDRO-OE-COPY
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Deploying Snow17 to OE..."
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.203.110.34 "
        sudo rm -rf /ngen-app/archive/standalone/snow17 || true &&
        sudo mv /ngen-app/standalone/snow17 /ngen-app/archive/standalone/snow17 || true &&
        sudo mkdir -p /ngen-app/standalone/snow17 &&
        sudo chown -R `whoami` /ngen-app/standalone/snow17"
    - scp ../snow17.tar.gz christina.osumi@10.203.110.34:/ngen-app/standalone/snow17
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.203.110.34 "
        cd /ngen-app/standalone/snow17 &&
        tar -xzf snow17.tar.gz . &&
        rm snow17.tar.gz"
    - echo "Snow17 deployed to OE"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'